<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Welcome, Player One — Movie Buzz Curriculum</title>
<meta http-equiv="refresh" content="3;url=lesson-viewer/weeks/index.html">
<link rel="icon" href="data:,">
<style>
  :root {
    --tlm-gold:   #DAA520;
    --depth-base: #0e0d0b;
    --depth-card: #211f1c;
    --glass-bg:   rgba(33, 31, 28, 0.80);
    --glass-border: rgba(218, 165, 32, 0.28);
    --text-primary: #F0EDE8;
    --text-muted:   #AAA99F;
    --font-sans: 'Helvetica Neue', Helvetica, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    --font-mono: ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, Consolas, monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--depth-base);
    color: var(--text-primary);
    font-family: var(--font-sans);
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }

  /* Ambient glow */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    background:
      radial-gradient(ellipse 70% 50% at 20% 10%, rgba(218,165,32,0.10) 0%, transparent 65%),
      radial-gradient(ellipse 60% 45% at 80% 90%, rgba(35,34,31,0.70)   0%, transparent 65%);
    z-index: 0;
    animation: glow 18s ease-in-out infinite;
  }

  @keyframes glow {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.7; }
  }

  @media (prefers-reduced-motion: reduce) {
    body::before { animation: none; }
    .card        { animation: none; opacity: 1; }
    .progress-bar { animation: none; width: 100%; }
  }

  .card {
    position: relative;
    z-index: 1;
    background: var(--glass-bg);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    padding: 52px 60px 48px;
    text-align: center;
    max-width: 520px;
    width: calc(100% - 40px);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.07),
      0 24px 64px rgba(0,0,0,0.6),
      0 0 0 1px rgba(218,165,32,0.08);
    animation: cardIn 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(24px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0)    scale(1); }
  }

  .clapperboard {
    font-size: 3.2rem;
    display: block;
    margin-bottom: 20px;
    animation: pop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s both;
  }

  @keyframes pop {
    from { opacity: 0; transform: scale(0.5) rotate(-8deg); }
    to   { opacity: 1; transform: scale(1)   rotate(0deg); }
  }

  h1 {
    font-size: 1.75rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text-primary);
    margin-bottom: 6px;
    line-height: 1.2;
  }

  .gold { color: var(--tlm-gold); }

  .subtitle {
    font-size: 0.95rem;
    color: var(--text-muted);
    margin-bottom: 36px;
    letter-spacing: 0.01em;
  }

  .progress-track {
    height: 3px;
    background: rgba(170,169,159,0.15);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 20px;
  }

  .progress-bar {
    height: 100%;
    background: linear-gradient(to right, var(--tlm-gold), #F5C842);
    border-radius: 2px;
    animation: fill 3s linear forwards;
  }

  @keyframes fill {
    from { width: 0%; }
    to   { width: 100%; }
  }

  .enter-link {
    display: inline-block;
    margin-top: 4px;
    padding: 12px 32px;
    background: rgba(218,165,32,0.12);
    border: 1px solid var(--glass-border);
    border-radius: 8px;
    color: var(--tlm-gold);
    font-family: var(--font-sans);
    font-size: 0.92rem;
    font-weight: 600;
    letter-spacing: 0.03em;
    text-decoration: none;
    text-transform: uppercase;
    transition: background 0.18s ease, border-color 0.18s ease, transform 0.18s ease;
  }

  .enter-link:hover {
    background: rgba(218,165,32,0.22);
    border-color: var(--tlm-gold);
    transform: translateY(-2px);
  }

  .redirect-note {
    margin-top: 18px;
    font-size: 0.8rem;
    color: var(--text-muted);
    font-family: var(--font-mono);
    opacity: 0.6;
  }
</style>
</head>
<body>
<div class="card">
  <span class="clapperboard">🎬</span>
  <h1>Welcome, <span class="gold">Player One</span></h1>
  <p class="subtitle">Movie Buzz Curriculum &mdash; 16-Week Full-Stack Bootcamp</p>
  <div class="progress-track">
    <div class="progress-bar"></div>
  </div>
  <a class="enter-link" href="lesson-viewer/weeks/index.html">Enter the Lesson Viewer</a>
  <p class="redirect-note">Redirecting automatically in 3 seconds&hellip;</p>
</div>
</body>
</html>
