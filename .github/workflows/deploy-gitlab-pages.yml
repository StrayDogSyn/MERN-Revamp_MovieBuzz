name: Deploy GitLab MovieBuzz to GitHub Pages

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clone GitLab repository
        run: |
          git clone https://gitlab.com/eric.petross/tlm-mern-moviebuzz-revamp.git source

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build static site
        run: |
          set -euo pipefail

          if [ -f source/client/package.json ]; then
            APP_DIR="source/client"
          elif [ -f source/package.json ]; then
            APP_DIR="source"
          else
            echo "No package.json found in expected locations."
            exit 1
          fi

          cd "$APP_DIR"

          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

          npm run build

          if [ -d build ]; then
            OUTPUT_DIR="build"
          elif [ -d dist ]; then
            OUTPUT_DIR="dist"
          else
            echo "Build output directory not found (expected build/ or dist/)."
            exit 1
          fi

          mkdir -p "$GITHUB_WORKSPACE/site"
          cp -R "$OUTPUT_DIR"/. "$GITHUB_WORKSPACE/site"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
