name: Deploy GitLab MovieBuzz to GitHub Pages

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

env:
  GITLAB_REPO_URL: https://gitlab.com/eric.petross/tlm-mern-moviebuzz-revamp.git

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clone GitLab repository
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
        run: |
          GITLAB_URL="${GITLAB_REPO_URL}"

          if [ -n "$GITLAB_TOKEN" ]; then
            ASKPASS_SCRIPT="/tmp/gitlab-askpass.sh"
            {
              echo '#!/usr/bin/env sh'
              echo 'case "$1" in'
              echo '  *Username*) echo "oauth2" ;;'
              echo '  *Password*) echo "$GITLAB_TOKEN" ;;'
              echo 'esac'
            } > "$ASKPASS_SCRIPT"
            chmod 500 "$ASKPASS_SCRIPT"
            GIT_ASKPASS="$ASKPASS_SCRIPT" GIT_TERMINAL_PROMPT=0 git clone "$GITLAB_URL" source
            rm -f "$ASKPASS_SCRIPT"
          else
            git clone "$GITLAB_URL" source
          fi

      - name: Resolve Node.js version
        id: node-version
        run: |
          if [ -f source/.nvmrc ]; then
            NODE_VERSION="$(sed 's/^v//' source/.nvmrc | tr -d '[:space:]')"
            echo "value=${NODE_VERSION}" >> "$GITHUB_OUTPUT"
          else
            echo "value=20" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.node-version.outputs.value }}

      - name: Build static site
        run: |
          set -euo pipefail

          if [ -f source/client/package.json ]; then
            APP_DIR="source/client"
          elif [ -f source/package.json ]; then
            APP_DIR="source"
          else
            echo "No package.json found in expected locations."
            exit 1
          fi

          cd "$APP_DIR"

          if ! node -e "const pkg=require('./package.json'); process.exit(pkg.scripts && pkg.scripts.build ? 0 : 1)"; then
            echo "No build script found in package.json for the selected app directory."
            exit 1
          fi

          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

          npm run build

          if [ -d build ]; then
            OUTPUT_DIR="build"
          elif [ -d dist ]; then
            OUTPUT_DIR="dist"
          else
            echo "Build output directory not found (expected build/ or dist/)."
            exit 1
          fi

          mkdir -p "$GITHUB_WORKSPACE/site"
          cp -R "$OUTPUT_DIR"/. "$GITHUB_WORKSPACE/site"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
