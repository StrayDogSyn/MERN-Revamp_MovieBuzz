name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare site files
        run: |
          set -e
          rm -rf _site
          mkdir -p _site
          # Copy root files (handle missing .nojekyll gracefully)
          cp index.html welcome-player-one.html _site/ || true
          [ -f .nojekyll ] && cp .nojekyll _site/ || touch _site/.nojekyll
          # Copy site directories
          [ -d lesson-viewer ] && cp -R lesson-viewer _site/ || true
          [ -d movie-buzz-slides ] && cp -R movie-buzz-slides _site/ || true
          # Verify we have content
          ls -la _site/ | head -20

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4